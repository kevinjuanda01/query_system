<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{css/index.css}">
    <title>問合せ一覧</title>
</head>
<header class="page-header">
        <h1>問合せ一覧</h1>
</header>
<body>
    <div class="body-style">
        <div class="page-header">
            <button class="button-style1" onclick="location.href='/new'">新規登録</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>顧客名</th>
                    <th>電話番号</th>
                    <th>対応ステータス</th>
                    <th>問合せ日時</th>
                    <th>詳細</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="query : ${queries}">
                    <td th:text="${query.id}"></td>
                    <td th:text="${query.author}"></td>
                    <td th:text="${query.phoneNumber}"></td>
                    <td th:text="${query.status}"></td>
                    <td th:text="${#temporals.format(query.date, 'yyyy-MM-dd HH:mm')}"></td>
                    <td><button class="button-style2">詳細</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
